server {
    listen 80;

    # Root — serve index.html explicitly
    location = / {
        proxy_pass http://localstack:4566/optimumu-site/index.html;
        proxy_set_header Host localstack;
    }

    location / {
        # Remove trailing slashes so /blog/ → /blog (then falls through to @try_index)
        rewrite ^/(.*)/$ /$1 permanent;

        # Try the exact S3 key first (handles /_astro/, /images/, etc.)
        proxy_pass http://localstack:4566/optimumu-site$uri;
        proxy_set_header Host localstack;
        proxy_intercept_errors on;
        error_page 404 = @try_index;
    }

    # Page routes: Astro puts each page at <route>/index.html
    location @try_index {
        proxy_pass http://localstack:4566/optimumu-site$uri/index.html;
        proxy_set_header Host localstack;
        proxy_intercept_errors on;
        error_page 404 = @not_found;
    }

    location @not_found {
        proxy_pass http://localstack:4566/optimumu-site/404.html;
        proxy_set_header Host localstack;
    }
}

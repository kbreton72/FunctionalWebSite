services:
  app:
    image: mcr.microsoft.com/devcontainers/javascript-node:22
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    env_file:
      - path: ../.env
        required: true
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost.localstack.cloud:4566
      AWS_PAGER: ""
    dns:
      - 172.28.0.100  # LocalStack DNS — resolves *.localhost.localstack.cloud to LocalStack
      - 8.8.8.8       # Fallback for general internet resolution
    depends_on:
      localstack:
        condition: service_healthy

  localstack:
    image: localstack/localstack-pro
    container_name: "funcwebsite-localstack"
    ports:
      - "0.0.0.0:4566:4566"
      - "[::]:4566:4566"
      - "0.0.0.0:80:80"
      - "[::]:80:80"
    env_file:
      - path: ../.env
        required: true
    environment:
      DEBUG: 1
      LS_TRACE: WARN
      PERSISTENCE: 1
      MAIN_CONTAINER_NAME: funcwebsite-localstack
      DNS_ADDRESS: 0.0.0.0  # Listen on all interfaces so the app container can reach it
      GATEWAY_LISTEN: "0.0.0.0:4566,0.0.0.0:80"  # Also serve on port 80 for optimumu.localhost
      EXTRA_CORS_ALLOWED_ORIGINS: "http://optimumu.localhost,http://optimumu.localhost:80"
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        ipv4_address: 172.28.0.100

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  localstack-data:
